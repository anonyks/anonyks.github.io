<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      if (path !== '/') {
        window.location.replace('/?p=' + encodeURIComponent(path));
      }
    </script>
  </head>
  <body></body>
</html>
